<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chatbot de Vacaciones · Metal Sur S.A.</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  #app {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* HEADER */
  #header {
    background: #2c2c2c;
    color: #fff;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #header .info { flex: 1; }
  #header .info .title { font-weight: 700; font-size: 15px; }
  #estado-label { font-size: 10px; opacity: 0.5; text-align: right; line-height: 1.6; }
  #estado-label span { color: #aaaaaa; font-weight: 700; }

  /* LEYENDA */
  #leyenda {
    display: flex;
    gap: 6px;
    padding: 5px 12px;
    background: #eeeeee;
    font-size: 11px;
    border-bottom: 1px solid #cccccc;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .badge { border-radius: 4px; padding: 1px 8px; font-weight: 600; border: 1px solid; }
  .badge-empleado  { background:#e8f5e9; border-color:#a5d6a7; }
  .badge-chatbot   { background:#f0f0f0; border-color:#bdbdbd; }
  .badge-encargado { background:#fdf6d8; border-color:#f0c040; }

  /* CHAT */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* BURBUJAS */
  .burbuja-wrap { display: flex; flex-direction: column; }
  .burbuja-wrap.derecha   { align-items: flex-end; }
  .burbuja-wrap.izquierda { align-items: flex-start; }
  .burbuja-label { font-size: 10px; color: #999; margin-bottom: 3px; padding: 0 4px; }
  .burbuja {
    max-width: 88%;
    padding: 10px 14px;
    font-size: 13.5px;
    line-height: 1.6;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    color: #1a1a1a;
    border: 1px solid;
  }
  .burbuja.empleado  { background:#e8f5e9; border-color:#a5d6a7; border-radius:16px 4px 16px 16px; }
  .burbuja.chatbot   { background:#f0f0f0; border-color:#bdbdbd; border-radius:4px 16px 16px 16px; }
  .burbuja.encargado { background:#fdf6d8; border-color:#f0c040; border-radius:4px 16px 16px 16px; }

  .botones-wrap { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .botones-wrap.derecha   { justify-content: flex-end; }
  .botones-wrap.izquierda { justify-content: flex-start; }
  .btn-accion {
    padding: 7px 18px; border-radius: 20px; border: none;
    font-weight: 700; font-size: 13px; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    font-family: inherit; transition: opacity 0.15s;
  }
  .btn-accion:hover { opacity: 0.85; }
  .btn-primary { background: #2c2c2c; color: #fff; }

  /* TYPING */
  #typing { display:none; align-items:center; }
  #typing.visible { display:flex; }
  #typing .dots {
    background:#f0f0f0; border:1px solid #bdbdbd;
    border-radius:4px 16px 16px 16px;
    padding:10px 18px; font-size:18px;
    letter-spacing:6px; color:#757575;
  }

  /* INPUT */
  #input-area {
    padding: 10px 12px; background: #fff;
    border-top: 1px solid #cccccc;
    display: flex; gap: 8px; flex-shrink: 0;
  }
  #txt-input {
    flex: 1; padding: 9px 14px; border-radius: 22px;
    border: 1.5px solid #bdbdbd; font-size: 14px;
    outline: none; font-family: inherit;
  }
  #txt-input:disabled { background: #f0f0f5; }
  #btn-enviar {
    padding: 9px 20px; border-radius: 22px; border: none;
    background: #2c2c2c; color: #fff; font-weight: 700;
    font-size: 14px; cursor: pointer; font-family: inherit;
  }
  #btn-enviar:disabled { background: #bbb; cursor: default; }

  /* BASE DE DATOS */
  #seccion-db {
    flex-shrink: 0;
    background: #222222;
    color: #e0e0e0;
    font-size: 12px;
    border-top: 2px solid #444444;
    max-height: 420px;
    display: flex;
    flex-direction: column;
  }
  #db-toggle {
    width: 100%;
    background: #2c2c2c;
    color: #aaaaaa;
    border: none;
    padding: 8px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: inherit;
    flex-shrink: 0;
  }
  #db-toggle:hover { background: #444444; }
  #db-contenido { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  #db-contenido.visible { display: flex; }
  .db-tabs { display: flex; gap: 4px; padding: 6px 12px 0; flex-shrink: 0; }
  .db-tab {
    padding: 4px 12px; border-radius: 6px 6px 0 0;
    border: none; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    background: #555555; color: #ccc;
  }
  .db-tab.activo { background: #444444; color: #fff; }
  .db-panel { display: none; overflow-y: auto; padding: 8px 12px; max-height: 340px; }
  .db-panel.visible { display: block; }
  .db-tabla { width: 100%; border-collapse: collapse; font-size: 11.5px; }
  .db-tabla th {
    background: #444444; color: #fff;
    padding: 5px 10px; text-align: left; white-space: nowrap;
    position: sticky; top: 0;
  }
  .db-tabla td { padding: 4px 10px; border-bottom: 1px solid #555555; white-space: nowrap; }
  .db-tabla tr:nth-child(even) td { background: #1a1a1a; }
  .db-tabla tr:hover td { background: #333333; }
  .saldo-ok   { color: #7cc892; font-weight: 700; }
  .saldo-cero { color: #f5a0a0; font-weight: 700; }
  .dec-aprobado  { color: #7cc892; }
  .dec-rechazado { color: #f5a0a0; }
  .dec-na        { color: #888; font-style: italic; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div class="info">
      <div class="title">Chatbot de Vacaciones · Metal Sur S.A.</div>
    </div>
    <div id="estado-label">Estado:<br/><span id="estado-txt">INICIO</span></div>
  </div>

  <div id="leyenda">
    <span class="badge badge-empleado">Empleado</span>
    <span class="badge badge-chatbot">Chatbot</span>
    <span class="badge badge-encargado">Encargado</span>
  </div>

  <div id="chat">
    <div id="typing"><div class="dots">···</div></div>
  </div>

  <div id="input-area">
    <input id="txt-input" type="text" placeholder="Ingrese su legajo..."/>
    <button id="btn-enviar">Enviar</button>
  </div>

  <!-- BASE DE DATOS -->
  <div id="seccion-db">
    <button id="db-toggle" onclick="toggleDb()">
      <span>Base de datos</span>
      <span id="db-arrow">▼</span>
    </button>
    <div id="db-contenido">
      <div class="db-tabs">
        <button class="db-tab activo" onclick="cambiarTab('empleados', this)">Empleados</button>
        <button class="db-tab" onclick="cambiarTab('solicitudes', this)">Solicitudes</button>
      </div>
      <div id="panel-empleados" class="db-panel visible">
        <table class="db-tabla" id="tabla-empleados"></table>
      </div>
      <div id="panel-solicitudes" class="db-panel">
        <table class="db-tabla" id="tabla-solicitudes"></table>
      </div>
    </div>
  </div>

</div>
<script>
// ─────────────────────────────────────────────────────────────
// BASE DE DATOS — BD_Vacaciones_MetalSur_SA.xlsx · Hoja: Empleados
// ─────────────────────────────────────────────────────────────
const DB = {
  1001: { nombre: "Gonzalez, Carlos",   area: "Produccion",     saldo: 14, tomados: 6  },
  1002: { nombre: "Fernandez, Maria",   area: "Administracion", saldo: 20, tomados: 0  },
  1003: { nombre: "Lopez, Roberto",     area: "Produccion",     saldo: 3,  tomados: 17 },
  1004: { nombre: "Diaz, Silvia",       area: "Produccion",     saldo: 10, tomados: 10 },
  1005: { nombre: "Perez, Juan",        area: "Administracion", saldo: 0,  tomados: 20 },
  1006: { nombre: "Romero, Ana",        area: "Produccion",     saldo: 15, tomados: 5  },
  1007: { nombre: "Sanchez, Miguel",    area: "Produccion",     saldo: 8,  tomados: 12 },
  1008: { nombre: "Torres, Laura",      area: "Administracion", saldo: 20, tomados: 0  },
  1009: { nombre: "Villalba, Hector",   area: "Produccion",     saldo: 12, tomados: 8  },
  1010: { nombre: "Acosta, Patricia",   area: "Administracion", saldo: 5,  tomados: 15 },
  1011: { nombre: "Molina, Diego",      area: "Produccion",     saldo: 18, tomados: 2  },
  1012: { nombre: "Gimenez, Claudia",   area: "Produccion",     saldo: 0,  tomados: 20 },
  1013: { nombre: "Ruiz, Fernando",     area: "Produccion",     saldo: 7,  tomados: 13 },
  1014: { nombre: "Cabrera, Veronica",  area: "Administracion", saldo: 20, tomados: 0  },
  1015: { nombre: "Benitez, Oscar",     area: "Produccion",     saldo: 4,  tomados: 16 },
};

// Hoja: Solicitudes
const SOLICITUDES = [];
let solId = 1;



// ─────────────────────────────────────────────────────────────
// MÁQUINA DE ESTADOS — fiel al BPMN TO-BE
// ─────────────────────────────────────────────────────────────
const E = {
  PEDIR_LEGAJO:       "PEDIR_LEGAJO",
  PEDIR_DIAS:         "PEDIR_DIAS",
  PROCESANDO:         "PROCESANDO",   // bloquea input mientras el bot trabaja
  FIN:                "FIN",
};
let estado = E.PEDIR_LEGAJO;
let sesion = {};
let sessionToken = 0; // cancela flujos async anteriores

// ─────────────────────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────────────────────
const chat     = document.getElementById("chat");
const typing   = document.getElementById("typing");
const txtInput = document.getElementById("txt-input");
const btnEnv   = document.getElementById("btn-enviar");
const estadoTxt= document.getElementById("estado-txt");

const CARRIL = {
  Empleado:  { clase:"empleado",  lado:"derecha",   label:"Empleado"  },
  Chatbot:   { clase:"chatbot",   lado:"izquierda", label:"Chatbot"   },
  Encargado: { clase:"encargado", lado:"izquierda", label:"Encargado" },
};

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function parseMd(t) {
  return t
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,     "<em style='opacity:0.7;font-size:12px'>$1</em>")
    .replace(/\n/g, "<br/>");
}

function actualizarUI() {
  const activo = estado === E.PEDIR_LEGAJO || estado === E.PEDIR_DIAS;
  txtInput.disabled = !activo;
  btnEnv.disabled   = !activo;
  estadoTxt.textContent = estado;
  txtInput.placeholder =
    estado === E.PEDIR_LEGAJO  ? "Ingrese su legajo (ej: 1001)..." :
    estado === E.PEDIR_DIAS    ? "Ingrese la cantidad de días..." :
    "Procesando...";
  if (activo) txtInput.focus();
}

function agregarMensaje(carril, texto, botones = null) {
  const c = CARRIL[carril];
  const wrap = document.createElement("div");
  wrap.className = `burbuja-wrap ${c.lado}`;

  const lbl = document.createElement("div");
  lbl.className = "burbuja-label";
  lbl.textContent = c.label;

  const burbuja = document.createElement("div");
  burbuja.className = `burbuja ${c.clase}`;
  burbuja.innerHTML = parseMd(texto);

  wrap.appendChild(lbl);
  wrap.appendChild(burbuja);

  if (botones) {
    const bw = document.createElement("div");
    bw.className = `botones-wrap ${c.lado}`;
    botones.forEach(b => {
      const btn = document.createElement("button");
      btn.className = "btn-accion btn-primary";
      btn.textContent = b.label;
      btn.onclick = () => procesarAccion(b.accion);
      bw.appendChild(btn);
    });
    wrap.appendChild(bw);
  }

  chat.insertBefore(wrap, typing);
  chat.scrollTop = chat.scrollHeight;
}

async function botDice(carril, texto, botones = null) {
  typing.classList.add("visible");
  chat.scrollTop = chat.scrollHeight;
  await delay(900);
  typing.classList.remove("visible");
  agregarMensaje(carril, texto, botones);
}

// ─────────────────────────────────────────────────────────────
// INICIO
// ─────────────────────────────────────────────────────────────
function iniciar() {
  sessionToken++; // invalida cualquier flujo async en curso
  [...chat.children].forEach(el => { if (el !== typing) el.remove(); });
  sesion = {};
  estado = E.PEDIR_LEGAJO;
  actualizarUI();
  agregarMensaje("Chatbot",
    " Bienvenido al sistema de gestión de vacaciones de **Metal Sur S.A.**\n\n" +
    "Ingrese su número de legajo para comenzar.\n\n" +
    "*Legajos válidos: 1001 al 1015*"
  );
}

// ─────────────────────────────────────────────────────────────
// ENVIAR INPUT
// ─────────────────────────────────────────────────────────────
async function enviar() {
  const val = txtInput.value.trim();
  if (!val) return;
  if (estado !== E.PEDIR_LEGAJO && estado !== E.PEDIR_DIAS) return;

  txtInput.value = "";
  const eraEstado = estado; // capturar ANTES de cambiar
  const miToken = ++sessionToken; // token de este flujo
  estado = E.PROCESANDO;   // bloquear inmediatamente
  actualizarUI();
  function activo() { return miToken === sessionToken; }

  // ── Paso 1: Empleado ingresa legajo ─────────────────────
  if (eraEstado === E.PEDIR_LEGAJO) {
    agregarMensaje("Empleado", val);
    const legajo = parseInt(val);

    if (isNaN(legajo)) {
      await botDice("Chatbot", " Debe ingresar un número.\n\n*Legajos válidos: 1001 al 1015*");
      estado = E.PEDIR_LEGAJO;
      actualizarUI();
      return;
    }

    const emp = DB[legajo];
    if (!emp) {
      await botDice("Chatbot",
        `Legajo **${legajo}** no encontrado en el sistema. Por favor, verifique el número e intentelo de nuevo.\n\n*Legajos válidos: 1001 al 1015*`
      );
      estado = E.PEDIR_LEGAJO;
      actualizarUI();
      return;
    }

    sesion = { legajo, emp };

    // Si el saldo es 0, terminar el proceso sin preguntar días
    if (emp.saldo === 0) {
      await botDice("Chatbot",
        `Hola, **${emp.nombre}**.\n\n`+
        `• Área: ${emp.area}\n`+
        `• Saldo disponible: **0 días**\n`+
        `• Días ya tomados: ${emp.tomados}\n\n`+
        `No dispone de días de vacaciones disponibles. No es posible realizar una solicitud en este momento.`,
        [{ label: "Nueva solicitud", accion: "reiniciar" }]
      );
      estado = E.FIN;
      actualizarUI();
      return;
    }

    await botDice("Chatbot",
      `Hola, **${emp.nombre}**.\n\n`+
      `• Área: ${emp.area}\n`+
      `• Saldo disponible: **${emp.saldo} días**\n`+
      `• Días ya tomados: ${emp.tomados}\n\n`+
      `¿Cuántos días de vacaciones desea solicitar?`
    );
    estado = E.PEDIR_DIAS;
    actualizarUI();
    return;
  }

  // ── Paso 2: Empleado ingresa días ───────────────────────
  agregarMensaje("Empleado", val);
  const dias = parseInt(val);

  if (isNaN(dias) || dias <= 0) {
    await botDice("Chatbot", " Por favor, ingrese un número mayor a 0.");
    estado = E.PEDIR_DIAS;
    actualizarUI();
    return;
  }

  sesion.dias = dias;

  // ── TAREA BOT: verifica saldo ────────────────────────────
  typing.classList.add("visible");
  chat.scrollTop = chat.scrollHeight;
  await delay(1000);
  if (!activo()) return;
  typing.classList.remove("visible");

  // ── GATEWAY 1: ¿Tiene saldo en días? ────────────────────
  if (dias > sesion.emp.saldo) {
    // Camino NO — rechazo automático
    registrarSolicitud(sesion.legajo, dias, "Rechazado", "N/A");
    await botDice("Chatbot",
      `**Saldo insuficiente.**\n\n`+
      `Tenés **${sesion.emp.saldo} días** disponibles y solicitaste **${dias}**.\n\n`+
      `Tu solicitud fue rechazada automáticamente.\n`+
      `Podés solicitar hasta **${sesion.emp.saldo} días**.`,
      [{ label: "Nueva solicitud", accion: "reiniciar" }]
    );
    estado = E.FIN;
    actualizarUI();
    return;
  }

  // Camino SÍ — Bot envía solicitud al encargado
  await botDice("Chatbot",
    `Saldo verificado: tenés **${sesion.emp.saldo} días** disponibles.\n\n`+
    `Tu solicitud de **${dias} días** fue enviada al encargado para su aprobación.`
  );
  if (!activo()) return;

  // ── Encargado revisa solicitud ───────────────────────────
  await botDice("Encargado",
    `**Nueva solicitud de vacaciones**\n\n`+
    `• Legajo: ${sesion.legajo}\n`+
    `• Empleado: ${sesion.emp.nombre}\n`+
    `• Área: ${sesion.emp.area}\n`+
    `• Días solicitados: **${dias}**\n`+
    `• Saldo disponible: ${sesion.emp.saldo}\n\n`+
    `Revisando solicitud...`
  );

  // ── GATEWAY 2: decisión aleatoria del encargado ─────────
  if (!activo()) return;
  // Entre 2 y 5 segundos de "deliberación"
  await delay(2000 + Math.random() * 3000);
  if (!activo()) return;

  const aprueba = Math.random() < 0.70; // 70% aprobación

  if (aprueba) {
    agregarMensaje("Encargado", `Solicitud aprobada por el encargado.`);

    const nuevoSaldo    = sesion.emp.saldo - dias;
    const nuevosTomados = sesion.emp.tomados + dias;
    DB[sesion.legajo].saldo    = nuevoSaldo;
    DB[sesion.legajo].tomados  = nuevosTomados;

    registrarSolicitud(sesion.legajo, dias, "Aprobado", "Aprobado");
    renderTablaEmpleados();

    await botDice("Chatbot",
      `**${sesion.emp.nombre}**, tu solicitud de **${dias} días** fue **aprobada** por el encargado.\n\n`+
      `Tu nuevo saldo de vacaciones es: **${nuevoSaldo} días**. ¡Que disfrutes el descanso! `,
      [{ label: "Nueva solicitud", accion: "reiniciar" }]
    );

  } else {
    agregarMensaje("Encargado", `Solicitud rechazada por el encargado.`);

    registrarSolicitud(sesion.legajo, dias, "Aprobado", "Rechazado");

    await botDice("Chatbot",
      `**${sesion.emp.nombre}**, tu solicitud de **${dias} días** fue **rechazada** por el encargado.\n\n`+
      `Tu saldo permanece en **${sesion.emp.saldo} días**. Contactá a tu encargado para más información.`,
      [{ label: "Nueva solicitud", accion: "reiniciar" }]
    );
  }

  renderTablaSolicitudes();
  estado = E.FIN;
  actualizarUI();
}

// ─────────────────────────────────────────────────────────────
// ACCIONES DE BOTONES
// ─────────────────────────────────────────────────────────────
function procesarAccion(accion) {
  if (accion === "reiniciar") iniciar();
}

// ─────────────────────────────────────────────────────────────
// REGISTRO DE SOLICITUDES
// ─────────────────────────────────────────────────────────────
function registrarSolicitud(legajo, dias, decisionBot, decisionEnc) {
  const hoy = new Date().toLocaleDateString("es-AR");
  const resultado = decisionBot === "Rechazado" ? "Rechazado" : decisionEnc === "Aprobado" ? "Aprobado" : "Rechazado";
  SOLICITUDES.push({
    id: `SOL-${String(solId++).padStart(3,"0")}`,
    legajo, dias, fecha: hoy, decisionBot, decisionEnc, resultado,
  });
}

// ─────────────────────────────────────────────────────────────
// BASE DE DATOS — RENDER
// ─────────────────────────────────────────────────────────────
function renderTablaEmpleados() {
  document.getElementById("tabla-empleados").innerHTML =
    `<tr>
      <th>Legajo</th><th>Apellido y Nombre</th><th>Área</th>
      <th>Saldo disponible</th><th>Días tomados</th>
    </tr>`+
    Object.entries(DB).map(([id, e]) =>
      `<tr>
        <td>${id}</td>
        <td>${e.nombre}</td>
        <td>${e.area}</td>
        <td class="${e.saldo === 0 ? 'saldo-cero' : 'saldo-ok'}">${e.saldo} días</td>
        <td>${e.tomados} días</td>
      </tr>`
    ).join("");
}

function renderTablaSolicitudes() {
  const t = document.getElementById("tabla-solicitudes");
  const header = `<tr>
      <th>ID</th><th>Legajo</th><th>Días</th><th>Fecha</th>
      <th>Gateway 1</th><th>Gateway 2</th><th>Resultado</th>
    </tr>`;
  if (SOLICITUDES.length === 0) {
    t.innerHTML = header + `<tr><td colspan="7" style="color:#888;padding:10px;text-align:center">Sin solicitudes registradas aún.</td></tr>`;
    return;
  }
  t.innerHTML = header +
    SOLICITUDES.map(s =>
      `<tr>
        <td>${s.id}</td>
        <td>${s.legajo}</td>
        <td>${s.dias}</td>
        <td>${s.fecha}</td>
        <td class="${s.decisionBot === 'Rechazado' ? 'dec-rechazado' : 'dec-aprobado'}">${s.decisionBot}</td>
        <td class="${s.decisionEnc === 'N/A' ? 'dec-na' : s.decisionEnc === 'Rechazado' ? 'dec-rechazado' : 'dec-aprobado'}">${s.decisionEnc}</td>
        <td class="${s.resultado === 'Aprobado' ? 'dec-aprobado' : 'dec-rechazado'}">${s.resultado}</td>
      </tr>`
    ).join("");
}

function toggleDb() {
  const c = document.getElementById("db-contenido");
  const a = document.getElementById("db-arrow");
  c.classList.toggle("visible");
  a.textContent = c.classList.contains("visible") ? "▲" : "▼";
}

function cambiarTab(tab, btn) {
  document.querySelectorAll(".db-tab").forEach(b => b.classList.remove("activo"));
  document.querySelectorAll(".db-panel").forEach(p => p.classList.remove("visible"));
  btn.classList.add("activo");
  document.getElementById("panel-" + tab).classList.add("visible");
}
